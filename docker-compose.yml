services:
  react:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Evita conflito com node_modules local
    environment:
      - CHOKIDAR_USEPOLLING=true  # Necessário em ambientes como Windows/WSL2
    networks:
      - rede
      
  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://usuario:senha@database:5432/bancodados
    depends_on:
      - database
    networks:
      - rede

  database:
    image: postgres:18
    volumes:
      - db_data:/var/lib/postgresql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_USER=usuario
      - POSTGRES_PASSWORD=senha
      - POSTGRES_DB=bancodados
    networks:
      - rede

volumes:
  db_data:

networks:
  rede: